<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名古屋市営地下鉄 3Dマップ</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
  body { background: radial-gradient(circle at 50% 15%, #2a3564 0%, #0d1026 75%); }
  canvas { display: block; }

  #panel {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(13, 16, 38, .85);
    border: 1px solid rgba(255, 255, 255, .16);
    border-radius: 14px; padding: 16px 18px; width: 232px;
    color: #fff; backdrop-filter: blur(6px);
  }
  #panel h1 { font-size: 16px; margin: 0 0 2px; }
  #panel .sub { font-size: 11px; color: #9aa3d0; margin-bottom: 12px; }
  label.line { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; margin: 6px 0; cursor: pointer; user-select: none; }
  .chip { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .depth-tag { margin-left: auto; font-size: 10px; color: #9aa3d0; font-weight: 400; }
  .row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 12px; }
  .row input[type="range"] { flex: 1; }
  .hint { font-size: 11px; color: #9aa3d0; margin-top: 12px; line-height: 1.7; border-top: 1px solid rgba(255,255,255,.12); padding-top: 10px; }

  #tooltip {
    position: fixed; z-index: 20; pointer-events: none; display: none;
    background: #fff; color: #1a1f3d; font-size: 13px; font-weight: 700;
    padding: 7px 12px; border-radius: 9px; white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0, 0, 0, .45);
  }
  #tooltip .lines { font-size: 10px; font-weight: 600; margin-top: 2px; display: flex; gap: 6px; }
  #tooltip .lines span { display: inline-flex; align-items: center; gap: 3px; color: #5a5f8a; }
  #tooltip .lines i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  @media (max-width: 640px) {
    #panel { width: auto; right: 16px; padding: 12px 14px; }
    #panel h1 { font-size: 14px; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<div id="panel">
  <h1>🚇 名古屋市営地下鉄 3Dマップ</h1>
  <div class="sub">路線ごとの深さをイメージした立体路線図</div>
  <div id="line-toggles"></div>
  <div class="row">
    <span>深さ強調</span>
    <input type="range" id="depth-scale" min="0.5" max="3" step="0.1" value="1.5">
  </div>
  <div class="row">
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
      <input type="checkbox" id="auto-rotate" checked> 自動回転
    </label>
  </div>
  <div class="hint">
    🖱️ ドラッグ：回転 ／ ホイール：ズーム<br>
    右ドラッグ：移動 ／ 駅にカーソルで駅名表示<br>
    ※ 駅位置・深さは概略のイメージです
  </div>
</div>

<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ===== 路線データ（座標はおおよその位置） ===== */
const LINES = [

      ['本山', 136.958, 35.164], ['東山公園', 136.966, 35.160], ['星ヶ丘', 136.975, 35.163],

  {

      ['矢場町', 136.907, 35.163], ['栄', 136.908, 35.168], ['久屋大通', 136.908, 35.173],
      ['名古屋城', 136.906, 35.181], ['名城公園', 136.905, 35.189], ['黒川', 136.909, 35.196],
      ['志賀本通', 136.916, 35.199], ['平安通', 136.925, 35.199], ['大曽根', 136.933, 35.192],
      ['ナゴヤドーム前矢田', 136.943, 35.187], ['砂田橋', 136.949, 35.183], ['茶屋ヶ坂', 136.952, 35.176],
      ['自由ヶ丘', 136.955, 35.169], ['本山', 136.958, 35.164], ['名古屋大学', 136.960, 35.155],
      ['八事日赤', 136.962, 35.145], ['八事', 136.963, 35.135], ['総合リハビリセンター', 136.957, 35.128],
      ['瑞穂運動場東', 136.950, 35.124], ['新瑞橋', 136.940, 35.121], ['妙音通', 136.932, 35.122],
      ['堀田', 136.924, 35.123], ['伝馬町', 136.912, 35.123], ['神宮西', 136.903, 35.127],
      ['西高蔵', 136.901, 35.135]
    ]
  },
  {
    name: '名港線', color: 0x8b7dc3, depth: -9, loop: false,
    stations: [
      ['金山', 136.901, 35.143], ['日比野', 136.898, 35.132], ['六番町', 136.895, 35.121],
      ['東海通', 136.891, 35.112], ['港区役所', 136.887, 35.104], ['築地口', 136.884, 35.097],
      ['名古屋港', 136.881, 35.090]
    ]
  },
  {
    name: '鶴舞線', color: 0x1e90d2, depth: -12, loop: false,
    stations: [
      ['上小田井', 136.874, 35.222], ['庄内緑地公園', 136.879, 35.213], ['庄内通', 136.885, 35.202],
      ['浄心', 136.890, 35.192], ['浅間町', 136.895, 35.183], ['丸の内', 136.899, 35.172],
      ['伏見', 136.897, 35.168], ['大須観音', 136.899, 35.159], ['上前津', 136.906, 35.158],
      ['鶴舞', 136.917, 35.155], ['荒畑', 136.925, 35.150], ['御器所', 136.932, 35.148],
      ['川名', 136.940, 35.143], ['いりなか', 136.949, 35.139], ['八事', 136.963, 35.135],
      ['塩釜口', 136.973, 35.132], ['植田', 136.982, 35.130], ['原', 136.991, 35.128],
      ['平針', 137.000, 35.127], ['赤池', 137.013, 35.128]
    ]
  },
  {
    name: '桜通線', color: 0xdc4045, depth: -16, loop: false,
    stations: [
      ['太閤通', 136.872, 35.165], ['名古屋', 136.882, 35.170], ['国際センター', 136.890, 35.171],
      ['丸の内', 136.899, 35.172], ['久屋大通', 136.908, 35.173], ['高岳', 136.916, 35.172],
      ['車道', 136.925, 35.170], ['今池', 136.936, 35.165], ['吹上', 136.938, 35.157],
      ['御器所', 136.932, 35.148], ['桜山', 136.928, 35.138], ['瑞穂区役所', 136.926, 35.130],
      ['瑞穂運動場西', 136.934, 35.123], ['新瑞橋', 136.940, 35.121], ['桜本町', 136.938, 35.112],
      ['鶴里', 136.943, 35.105], ['野並', 136.949, 35.098], ['鳴子北', 136.957, 35.093],
      ['相生山', 136.967, 35.090], ['神沢', 136.980, 35.087], ['徳重', 136.993, 35.086]
    ]
  },
  {
    name: '上飯田線', color: 0xf39ab5, depth: -7, loop: false,
    stations: [
      ['上飯田', 136.925, 35.206], ['平安通', 136.925, 35.199]
    ]
  }
];

/* 地図座標 → シーン座標 */
const project = (lng, lat) => ({ x: (lng - 136.922) * 600, z: (35.155 - lat) * 730 });

/* ===== シーン基本 ===== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(10, 80, 95);
if (camera.aspect < 1) camera.position.multiplyScalar(1.6);  // 縦長画面では引きで全体を収める

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, -8, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.7;
controls.maxDistance = 250;
controls.minDistance = 25;
controls.maxPolarAngle = 1.62;

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dir = new THREE.DirectionalLight(0xffffff, 1.3);
dir.position.set(60, 100, 40);
scene.add(dir);

/* ===== 地面（半透明で地下が透ける） ===== */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(150, 140),
  new THREE.MeshStandardMaterial({ color: 0x232a52, transparent: true, opacity: 0.38, side: THREE.DoubleSide })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

const grid = new THREE.GridHelper(150, 30, 0x4a5590, 0x323b6e);
grid.material.transparent = true;
grid.material.opacity = 0.35;
grid.position.y = 0.02;
scene.add(grid);

/* ===== ラベル用スプライト ===== */
function makeLabel(text, fs = 30) {
  const pad = 12;
  const m = document.createElement('canvas').getContext('2d');
  m.font = `700 ${fs}px sans-serif`;
  const w = Math.ceil(m.measureText(text).width) + pad * 2;
  const h = Math.ceil(fs * 1.55);
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.beginPath();
  ctx.roundRect(1, 1, w - 2, h - 2, 10);
  ctx.fillStyle = 'rgba(10, 13, 40, .82)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.font = `700 ${fs}px sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, pad, h / 2 + 1);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sp.scale.set(w / 24, h / 24, 1);
  return sp;
}

/* ===== 路線・駅の構築 ===== */
const subway = new THREE.Group();   // 深さ強調スライダーで scale.y を変える
scene.add(subway);
const labelGroup = new THREE.Group();
scene.add(labelGroup);

const stationMeshes = [];           // レイキャスト対象
const stationIndex = new Map();     // 駅名 → [{line, color, x, z, depth}]
const sphereGeo = new THREE.SphereGeometry(1, 18, 14);

for (const line of LINES) {
  const g = new THREE.Group();
  const pts = line.stations.map(([name, lng, lat]) => {
    const { x, z } = project(lng, lat);
    (stationIndex.get(name) ?? stationIndex.set(name, []).get(name))
      .push({ line: line.name, color: line.color, x, z, depth: line.depth });
    return new THREE.Vector3(x, line.depth, z);
  });

  const curve = new THREE.CatmullRomCurve3(pts, line.loop, 'catmullrom', 0.5);
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, pts.length * 10, 0.5, 10, line.loop),
    new THREE.MeshStandardMaterial({ color: line.color, emissive: line.color, emissiveIntensity: 0.35, roughness: 0.4 })
  );
  g.add(tube);
  line.group = g;
  subway.add(g);
}

/* 駅マーカー（乗換駅は大きめ） */
const TERMINALS = new Set(['高畑', '藤が丘', '上小田井', '赤池', '太閤通', '徳重', '名古屋港', '上飯田', '名古屋城', '大曽根']);
const labeledNames = new Set();
const majorLabels = [];   // 主要駅ラベル：乗り入れ路線が全部OFFなら隠す
for (const [name, entries] of stationIndex) {
  const isTransfer = new Set(entries.map(e => e.line)).size >= 2;
  for (const e of entries) {
    const lineObj = LINES.find(l => l.name === e.line);
    const s = new THREE.Mesh(
      sphereGeo,
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.25 })
    );
    const r = isTransfer ? 1.0 : 0.68;
    s.scale.setScalar(r);
    s.position.set(e.x, e.depth, e.z);
    s.userData = { name, entries };
    lineObj.group.add(s);
    stationMeshes.push(s);
  }
  /* 乗換駅：深さ違いをつなぐ縦シャフト＋地上ラベル */
  if (isTransfer || TERMINALS.has(name)) {
    labeledNames.add(name);
    const x = entries[0].x, z = entries[0].z;
    const minD = Math.min(...entries.map(e => e.depth));
    const shaft = new THREE.Mesh(
      new THREE.CylinderGeometry(0.16, 0.16, -minD + 0.5, 8),
      new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.45 })
    );
    shaft.position.set(x, minD / 2 + 0.25, z);
    subway.add(shaft);

    const label = makeLabel(name, isTransfer ? 30 : 26);
    label.position.set(x, 5.2, z);
    labelGroup.add(label);
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 4.4, 6),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 })
    );
    stem.position.set(x, 2.2, z);
    labelGroup.add(stem);
    majorLabels.push({ parts: [shaft, label, stem], lineNames: [...new Set(entries.map(e => e.line))] });
  }
}

/* ===== 全駅ラベル（ズームインしたときだけ、カメラに近い駅のみ表示） ===== */
const minorLabels = [];
for (const [name, entries] of stationIndex) {
  if (labeledNames.has(name)) continue;
  const e = entries[0];
  const g = new THREE.Group();
  const label = makeLabel(name, 22);
  label.position.set(e.x, 3.2, e.z);
  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 2.6, 5),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 })
  );
  stem.position.set(e.x, 1.3, e.z);
  g.add(label, stem);
  g.visible = false;
  g.userData.pos = new THREE.Vector3(e.x, 0, e.z);
  g.userData.lineNames = [...new Set(entries.map(en => en.line))];
  labelGroup.add(g);
  minorLabels.push(g);
}
const SHOW_ALL_DIST = 110;  // これよりズームインすると全駅名が出る
const CULL_DIST = 95;       // カメラからこの距離より遠いラベルは隠す

/* ===== 地上ランドマーク ===== */
const landmarks = new THREE.Group();
scene.add(landmarks);

function addLandmark(mesh, lng, lat, labelText) {
  const { x, z } = project(lng, lat);
  mesh.position.x += x;
  mesh.position.z += z;
  landmarks.add(mesh);
  if (labelText) {
    const l = makeLabel(labelText, 24);
    l.position.set(x, mesh.position.y + 9, z);
    landmarks.add(l);
  }
}

/* JRセントラルタワーズ（名古屋駅） */
{
  const tower = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x9db1d8, transparent: true, opacity: 0.85 });
  const t1 = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 15, 12), mat);
  t1.position.set(-1.7, 7.5, 0);
  const t2 = t1.clone(); t2.position.x = 1.7;
  const base = new THREE.Mesh(new THREE.BoxGeometry(6.5, 4, 3.4), mat);
  base.position.y = 2;
  tower.add(t1, t2, base);
  tower.position.y = 0;
  addLandmark(tower, 136.882, 35.171, null);
}
/* 中部電力 MIRAI TOWER（久屋大通） */
{
  const tv = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0xd9dde8 });
  const legs = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 1.6, 8, 4, 1, true), mat);
  legs.position.y = 4;
  const spire = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.25, 6, 6), mat);
  spire.position.y = 11;
  const deck = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.6, 10), mat);
  deck.position.y = 8.2;
  tv.add(legs, spire, deck);
  addLandmark(tv, 136.908, 35.171, null);
}
/* 名古屋城 */
{
  const castle = new THREE.Group();
  const stone = new THREE.Mesh(
    new THREE.CylinderGeometry(2.4, 3.2, 2.6, 4),
    new THREE.MeshStandardMaterial({ color: 0x8d8f99 })
  );
  stone.position.y = 1.3; stone.rotation.y = Math.PI / 4;
  const keep = new THREE.Mesh(
    new THREE.CylinderGeometry(1.3, 2.0, 3.4, 4),
    new THREE.MeshStandardMaterial({ color: 0xf2f4ef })
  );
  keep.position.y = 4.2; keep.rotation.y = Math.PI / 4;
  const roof = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 1.7, 1.6, 4),
    new THREE.MeshStandardMaterial({ color: 0x2e8b6f })
  );
  roof.position.y = 6.6; roof.rotation.y = Math.PI / 4;
  castle.add(stone, keep, roof);
  addLandmark(castle, 136.899, 35.185, '名古屋城');
}
/* バンテリンドーム */
{
  const dome = new THREE.Mesh(
    new THREE.SphereGeometry(3.0, 20, 12, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshStandardMaterial({ color: 0xc8cfdd, transparent: true, opacity: 0.9 })
  );
  dome.position.y = 0;
  addLandmark(dome, 136.945, 35.190, 'バンテリンドーム');
}
/* 名古屋港 */
{
  const sea = new THREE.Mesh(
    new THREE.CircleGeometry(7, 24),
    new THREE.MeshStandardMaterial({ color: 0x1e6ad2, transparent: true, opacity: 0.5 })
  );
  sea.rotation.x = -Math.PI / 2;
  sea.position.y = 0.05;
  addLandmark(sea, 136.878, 35.083, null);
}

/* ===== UI：路線トグル ===== */
const togglesEl = document.getElementById('line-toggles');
for (const line of LINES) {
  const hex = '#' + line.color.toString(16).padStart(6, '0');
  const label = document.createElement('label');
  label.className = 'line';
  label.innerHTML =
    `<input type="checkbox" checked> <span class="chip" style="background:${hex}"></span>` +
    `${line.name} <span class="depth-tag">地下${-line.depth}m級</span>`;
  label.querySelector('input').addEventListener('change', ev => {
    line.group.visible = ev.target.checked;
  });
  togglesEl.appendChild(label);
}

document.getElementById('depth-scale').addEventListener('input', ev => {
  subway.scale.y = parseFloat(ev.target.value);
});
subway.scale.y = 1.5;

document.getElementById('auto-rotate').addEventListener('change', ev => {
  controls.autoRotate = ev.target.checked;
});
renderer.domElement.addEventListener('pointerdown', () => {
  controls.autoRotate = false;
  document.getElementById('auto-rotate').checked = false;
});

/* ===== ホバーで駅名ツールチップ ===== */
const tooltip = document.getElementById('tooltip');
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

addEventListener('pointermove', ev => {
  pointer.x = (ev.clientX / innerWidth) * 2 - 1;
  pointer.y = -(ev.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(stationMeshes.filter(m => m.parent.visible), false);
  if (hits.length) {
    const { name, entries } = hits[0].object.userData;
    const lineChips = [...new Map(entries.map(e => [e.line, e.color]))]
      .map(([ln, col]) => `<span><i style="background:#${col.toString(16).padStart(6, '0')}"></i>${ln}</span>`)
      .join('');
    tooltip.innerHTML = `${name}<div class="lines">${lineChips}</div>`;
    tooltip.style.display = 'block';
    tooltip.style.left = (ev.clientX + 14) + 'px';
    tooltip.style.top = (ev.clientY + 14) + 'px';
    document.body.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    document.body.style.cursor = '';
  }
});

/* ===== ループ・リサイズ ===== */
/* パネルが画面幅の大半を占める縦長レイアウトでは、パネルに隠れないよう描画中心を下へずらす */
function updateLayout() {
  const w = innerWidth, h = innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  const panel = document.getElementById('panel').getBoundingClientRect();
  if (panel.width > w * 0.55) {
    const shift = Math.min(panel.bottom * 0.55, h * 0.3);
    camera.setViewOffset(w, h, 0, -shift, w, h);
  } else {
    camera.clearViewOffset();
  }
}
addEventListener('resize', updateLayout);
updateLayout();

renderer.setAnimationLoop(() => {
  controls.update();
  const visibleLines = new Set(LINES.filter(l => l.group.visible).map(l => l.name));
  for (const m of majorLabels) {
    const v = m.lineNames.some(n => visibleLines.has(n));
    for (const p of m.parts) p.visible = v;
  }
  const showAll = camera.position.distanceTo(controls.target) < SHOW_ALL_DIST;
  for (const g of minorLabels) {
    g.visible = showAll &&
      g.userData.lineNames.some(n => visibleLines.has(n)) &&
      camera.position.distanceTo(g.userData.pos) < CULL_DIST;
  }
  renderer.render(scene, camera);
});
</script>
</body>
